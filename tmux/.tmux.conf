# --- General Settings ---
# Change prefix from Ctrl-b to Ctrl-a (screen-like)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Speed up escape for Neovim
set -sg escape-time 0

# Increase history limit
set -g history-limit 100000

# Enable mouse support (clicking tabs, resizing panes)
set -g mouse on

# Pass focus events to applications (needed for Neovim autoread)
set -g focus-events on

# Vi mode for copy/paste
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'; \
     bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'; \
     bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# Fix colors for Neovim (Ensures 256-color support)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Window/Pane Management ---
# Start numbering at 1 (instead of 0) to match keyboard row
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Use | and - to split panes (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New windows keep current path
bind c new-window -c "#{pane_current_path}"

# --- Status Bar & Visuals ---
set -g status-interval 5
set -g status-left-length 30
set -g status-style bg=default,fg=white
set -g status-left "#[fg=cyan,bold]#S #[fg=white]| "
set -g status-right "#[fg=blue]%H:%M #[fg=white]| #[fg=magenta]#H"

# Highlight active window
setw -g window-status-current-style fg=black,bg=cyan,bold
 