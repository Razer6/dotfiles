# --- General Settings ---
# Change prefix from Ctrl-b to Ctrl-a (screen-like)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Speed up escape for Neovim
set -sg escape-time 0

# Increase history limit
set -g history-limit 100000

# Enable mouse support (clicking tabs, resizing panes)
set -g mouse on

# Fix colors for Neovim (Ensures 256-color support)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Window/Pane Management ---
# Start numbering at 1 (instead of 0) to match keyboard row
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Use | and - to split panes (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Status Bar & Visuals ---
set -g status-interval 5
set -g status-left-length 30
set -g status-style bg=default,fg=white
set -g status-left "#[fg=cyan,bold]#S #[fg=white]| "
set -g status-right "#[fg=blue]%H:%M #[fg=white]| #[fg=magenta]#H"

# Highlight active window
setw -g window-status-current-style fg=black,bg=cyan,bold
 